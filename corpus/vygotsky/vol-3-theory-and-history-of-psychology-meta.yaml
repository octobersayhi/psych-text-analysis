    methodology. line_range 為近似估計。'
- title: On Vygotsky's Creative Development
  line_range:
  - 301
  - 600
  summary: Leont'ev traces Vygotsky's intellectual biography from literary criticism
    to psychology, his role in building Marxist psychology, and the development of
    cultural-historical theory. line_range 為近似估計。
- title: 'Part 1: Problems of the Theory and Methods of Psychology'
  line_range:
