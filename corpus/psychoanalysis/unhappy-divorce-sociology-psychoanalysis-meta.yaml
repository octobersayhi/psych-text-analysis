chapter_outline:
- title: 'Introduction: The Unhappy Divorce: From Marginalization to Revitalization'
  line_range:
  - 1
  - 300
  summary: Editors argue that the marginalization of psychoanalysis in US sociology is a mistake, and that psychosocial approaches
    can revitalize sociological theory and research on inequality, race, gender, and social movements. (line_range 为近似估计)
- title: 'Part I: The History of Sociology and Psychoanalysis in the United States'
  line_range:
  - 301
  - 460
  summary: Historical analysis of the relationship, focusing on the rise and fall of psychoanalytic influence in US sociology
    from the 1940s to 1960s. (line_range 为近似估计)
- title: 'Chapter 1: Opening/Closing the Sociological Mind to Psychoanalysis'
  line_range:
  - 301
  - 380
  summary: Cavalletto and Silver present statistical evidence of a peak in psychoanalytic references in AJS and ASR in the
    1950s, followed by a sharp decline due to the rise of methodological positivism. (line_range 为近似估计)
- title: 'Chapter 2: Paranoid and Institutional Responses to Psychoanalysis among Early Sociologists'
  line_range:
  - 381
  - 440
  summary: Silver uses a socio-psychoanalytic lens to argue that early sociologists' rejection of psychoanalysis was driven
    by paranoid fears and defenses related to professional identity and scientific legitimacy. (line_range 为近似估计)
- title: 'Chapter 3: The Unconscious in Cultural Dispute: On the Ethics of Psychosocial Discovery'
  line_range:
  - 441
  - 500
  summary: DeGloma analyzes how the gay pride and recovered memory movements challenged psychoanalytic authority, promoting
    an ethic of participatory democracy over dynamic paternalism. (line_range 为近似估计)
- title: 'Part II: Are Psychosocial/Socioanalytic Syntheses Possible?'
  line_range:
  - 501
  - 620
  summary: Dually trained scholars debate the compatibility of sociology and psychoanalysis, exploring possibilities and obstacles
    for integration. (line_range 为近似估计)
- title: 'Chapter 4: Sustaining an Unlikely Marriage'
  line_range:
  - 501
  - 560
  summary: Smelser provides a personal and intellectual account of his dual career, highlighting the theoretical and methodological
    obstacles to a fruitful marriage between the two fields. (line_range 为近似估计)
- title: 'Chapter 5: Why Is It Easy to Be a Psychoanalyst and a Feminist, But Not a Psychoanalyst and a Social Scientist?'
  line_range:
  - 561
  - 600
  summary: Chodorow reflects on the professional difficulties of being both a sociologist and a psychoanalyst, arguing that
    the two fields are not inherently incompatible. (line_range 为近似估计)
- title: 'Chapter 6: The Narcissism of Minor Differences'
  line_range:
  - 601
  - 640
  summary: Movahedi uses the concept of narcissism to explain sociologists' resistance to psychoanalysis, arguing that the
    two fields share related premises. (line_range 为近似估计)
- title: 'Part III: The Unfulfilled Promise of Psychoanalysis and Sociological Theory'
  line_range:
  - 641
  - 780
  summary: Examines how major social theorists (Fromm, Mills, Bourdieu) engaged or failed to engage with psychoanalysis, and
    the consequences for sociology. (line_range 为近似估计)
- title: 'Chapter 7: Escapes from Freedom'
  line_range:
  - 641
  - 700
  summary: McLaughlin argues that Erich Fromm's work offers a fruitful empirical application of psychoanalysis for studying
    authoritarianism, destructiveness, and automaton conformity. (line_range 为近似估计)
- title: 'Chapter 8: C. Wright Mills, Freud, and the Psychosocial Imagination'
  line_range:
  - 701
  - 740
  summary: Chancer discusses how Mills' exclusion of Freudian ideas from his psychosocial theorizing limited the development
    of a more radical sociological imagination. (line_range 为近似估计)
- title: 'Chapter 9: From Sociology to Socioanalysis'
  line_range:
  - 741
  - 780
  summary: Steinmetz argues that Bourdieu's work would have benefited from explicit engagement with Lacanian psychoanalysis,
    particularly for concepts like habitus and symbolic capital. (line_range 为近似估计)
- title: 'Chapter 10: The Ethnographic Spiral'
  line_range:
  - 781
  - 820
  summary: Manning discusses how ethnographers could benefit from psychoanalytic concepts like transference and counter-transference
    to deepen their interpretations. (line_range 为近似估计)
- title: 'Part IV: The Psychosocial (Analytic) In Research and Practice'
  line_range:
  - 821
  - 921
  summary: Showcases empirical research that explicitly integrates psychoanalytic and sociological perspectives to analyze
    contemporary social issues. (line_range 为近似估计)
- title: 'Chapter 11: Persona'
  line_range:
  - 821
  - 850
  summary: Zwerman reflects on her own psychosocial background and the intersubjective connection with a research subject,
    exploring the role of fantasy and doubling in research. (line_range 为近似估计)
- title: 'Chapter 12: Foreclosure from Freud to Fannie Mae'
  line_range:
  - 851
  - 870
  summary: Andrews uses the psychoanalytic concept of foreclosure to analyze the entanglement of homeowners' rage and the
    2007 mortgage crisis. (line_range 为近似估计)
- title: 'Chapter 13: Melancholia and the Racial Order'
  line_range:
  - 871
  - 890
  summary: Prager applies Freud's concept of melancholia to explain the persistent and haunting effects of racism on American
    society. (line_range 为近似估计)
- title: 'Chapter 14: On the Melancholia of New Individualism'
  line_range:
  - 891
  - 900
  summary: Elliott argues that contemporary individualism, characterized by radical flexibility, is marked by a fundamental
    melancholia and loss of self. (line_range 为近似估计)
- title: 'Chapter 15: The Shame of Survival'
  line_range:
  - 901
  - 910
  summary: Stein uses psychosocial tools to analyze the intergenerational transmission of trauma among Holocaust survivors,
    emphasizing shame and stigma over guilt. (line_range 为近似估计)
- title: 'Chapter 16: Racial Hatred and Racial Prejudice'
  line_range:
  - 911
  - 920
  summary: Jefferson argues for a crucial distinction between racial prejudice and racial hatred, a distinction often conflated
    in sociological analysis. (line_range 为近似估计)
- title: 'Chapter 17: Definitive Exclusions'
  line_range:
  - 921
  - 921
  summary: Singh uses psychoanalytic perspectives to illuminate the subjective dimensions of religious pilgrimage, neo-caste
    ideologies, and popular media in India. (line_range 为近似估计)
- title: 'Chapter 18: ''One Has to Belong, Somehow'''
  line_range:
  - 921
  - 921
  summary: Yorukoglu uses a psychosocial perspective to critique immigration literature, showing how Turkish women in Berlin
