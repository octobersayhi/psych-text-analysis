chapter_outline:
- title: Introduction
  line_range:
  - 1
  - 100
  summary: Editors introduce the centenary history of the IPA, outlining the book's
    structure and the global scope of psychoanalysis. (line_range 為近似估計)
- title: 'Part I: Europe'
  line_range:
  - 101
  - 800
  summary: Covers the history of psychoanalysis in 18 European countries, including
    Austria, Germany, France, UK, Italy, and others. (line_range 為近似估計)
- title: 'Part II: North America'
  line_range:
  - 801
  - 1000
  summary: Chapters on Canada and the United States, focusing on the development of
    psychoanalysis and its relationship with the IPA. (line_range 為近似估計)
- title: 'Part III: Latin America'
  line_range:
  - 1001
  - 1400
  summary: Covers 12 chapters on Latin American countries, including Argentina, Brazil,
    Chile, Mexico, Peru, and Venezuela. (line_range 為近似估計)
- title: 'Part IV: Asia & Oceania'
  line_range:
  - 1401
  - 1700
  summary: Chapters on Australia, China, India, Israel, Japan, Korea, Taiwan, and
    Turkey, detailing the spread of psychoanalysis. (line_range 為近似估計)
- title: 'Part V: International Survey'
  line_range:
  - 1701
  - 1850
  summary: Two chapters on the International Training Commission (1925-1938) and the
    history of new groups within the IPA. (line_range 為近似估計)
- title: 'Part VI: IPA Leadership'
  line_range:
  - 1851
  - 2046
  summary: Six chapters covering IPA administrations from 1969 to 2009, written by
    former presidents and secretaries. (line_range 為近似估計)
